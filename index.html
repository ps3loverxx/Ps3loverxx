<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PS3 HEN Installer</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ccc;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #fff; margin-bottom: 10px; }
        p { margin-bottom: 30px; font-size: 0.9rem; }
        
        #install-btn {
            padding: 20px 60px;
            font-size: 1.5rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        #install-btn:hover { background-color: #0056b3; }
        
        /* La zone de log qui fait "pro" */
        #log {
            margin-top: 30px;
            padding: 15px;
            width: 80%;
            max-width: 500px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            color: #00ff00; /* Texte vert style terminal */
            font-family: monospace;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>PS3 HEN Installer</h1>
    <p>Version 4.93.1 | Official Tool</p>

    <button id="install-btn" onclick="startInstall()">INITIALISER HEN</button>

    <div id="log">En attente...</div>

    <script>
        function startInstall() {
            var logDiv = document.getElementById('log');
            var btn = document.getElementById('install-btn');
            
            btn.disabled = true; // Désactive le bouton après clic
            logDiv.innerHTML = "Initialisation en cours...<br>";
            
            setTimeout(function() {
                logDiv.innerHTML += "Chargement des scripts...<br>";
            }, 1000);
            
            setTimeout(function() {
                logDiv.innerHTML += "Succès : HEN prêt à être injecté.<br>";
                // Ici tu pourrais mettre ta redirection ou l'appel de ton fichier .bin
            }, 2500);
        }
    </script>
</body>
</html>
